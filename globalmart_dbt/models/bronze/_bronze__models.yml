version: 2

models:
  - name: raw_customers
    description: "Bronze extraction of customer data from VARIANT. 4 ID column variants, 2 name variants, 2 email variants, 2 segment variants."
    columns:
      - name: customer_id
        description: "Region 1, 4, 5 ID column"
      - name: customerid
        description: "Region 2 ID column (CustomerID)"
      - name: cust_id
        description: "Region 3 ID column"
      - name: customer_identifier
        description: "Region 6 ID column"

  - name: raw_orders
    description: "Bronze extraction of order data from VARIANT. 3 CSV files across regions 1, 3, 5."
    columns:
      - name: order_id
        description: "Order identifier"
      - name: customer_id
        description: "Customer FK"
      - name: order_purchase_date
        description: "Raw date string (multiple formats across regions)"

  - name: raw_transactions
    description: "Bronze extraction of transaction data from VARIANT. Column casing varies: Order_id vs Order_ID."
    columns:
      - name: order_id_v1
        description: "Order_id casing variant"
      - name: order_id_v2
        description: "Order_ID casing variant"

  - name: raw_returns
    description: "Bronze extraction of return data from VARIANT JSON. Every column name differs between files."
    columns:
      - name: order_id_v1
        description: "order_id from returns_1.json"
      - name: order_id_v2
        description: "OrderId from returns_2.json"

  - name: raw_products
    description: "Bronze extraction of product catalog from VARIANT JSON."
    columns:
      - name: product_id
        description: "Product identifier"
      - name: upc
        description: "UPC code (may be in scientific notation)"

  - name: raw_vendors
    description: "Bronze extraction of vendor reference from VARIANT CSV."
    columns:
      - name: vendor_id
        description: "Vendor identifier"
      - name: vendor_name
        description: "Vendor company name"
