version: 2

models:
  - name: dim_customers
    description: "374 unique customers after ROW_NUMBER dedup from 748 raw records. Surrogate key via dbt_utils."
    columns:
      - name: customer_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Business key"
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product catalog dimension from Silver."
    columns:
      - name: product_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: product_id
        description: "Business key"
        tests:
          - not_null

  - name: dim_vendors
    description: "Vendor reference dimension."
    columns:
      - name: vendor_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: vendor_id
        description: "Business key"
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Generated calendar dimension covering full date range of orders and returns."
    columns:
      - name: date_sk
        description: "Surrogate key"
        tests:
          - unique
          - not_null
      - name: date_key
        description: "Calendar date"
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: "Fact table at order line item grain. Orders INNER JOIN Transactions."
    config:
      materialized: incremental
      incremental_strategy: append
    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null
      - name: customer_sk
        description: "FK to dim_customers"
      - name: product_sk
        description: "FK to dim_products"

  - name: fact_returns
    description: "Fact table at return event grain. Returns LEFT JOIN Orders."
    config:
      materialized: incremental
      incremental_strategy: append
    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null

  - name: bridge_return_products
    description: "Bridge table for proportional refund allocation. Grain: return x product."
    config:
      materialized: incremental
      incremental_strategy: append
    columns:
      - name: allocation_weight
        description: "line_sales / total_order_sales"

  - name: mv_revenue_by_region
    description: "Gold MV: revenue aggregated by year x month x region. Rubric-required name."

  - name: mv_return_rate_by_vendor
    description: "Gold MV: return rate per vendor. Rubric-required name."

  - name: mv_slow_moving_products
    description: "Gold MV: bottom 25% by quantity per region via PERCENT_RANK. Rubric-required name."
